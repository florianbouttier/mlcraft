
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neo Data SaaS Palette</title>
<style>
body {
    background: #F6F8FC;
    font-family: Arial, sans-serif;
    padding: 40px;
}
.section {
    margin-bottom: 40px;
}
h2 {
    margin-bottom: 12px;
}
.grid {
    display: grid;
    grid-template-columns: repeat(6, 120px);
    gap: 12px;
}
.swatch {
    height: 80px;
    border-radius: 8px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-size: 12px;
    color: #000;
    padding: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}
.light-text {
    color: #fff;
}
</style>
</head>
<body>

<div class="section">
<h2>Core</h2>
<div class="grid">
<div class="swatch light-text" style="background:#3A63F3">#3A63F3</div>
<div class="swatch light-text" style="background:#7C3AED">#7C3AED</div>
<div class="swatch light-text" style="background:#06B6D4">#06B6D4</div>
<div class="swatch" style="background:#F59E0B">#F59E0B</div>
</div>
</div>

<div class="section">
<h2>Neutrals</h2>
<div class="grid">
<div class="swatch" style="background:#F6F8FC">#F6F8FC</div>
<div class="swatch" style="background:#FFFFFF;border:1px solid #ccc">#FFFFFF</div>
<div class="swatch" style="background:#EEF2FF">#EEF2FF</div>
<div class="swatch" style="background:#E5E7EB">#E5E7EB</div>
<div class="swatch light-text" style="background:#64748B">#64748B</div>
<div class="swatch light-text" style="background:#0F172A">#0F172A</div>
</div>
</div>

<div class="section">
<h2>States</h2>
<div class="grid">
<div class="swatch" style="background:#22C55E">#22C55E</div>
<div class="swatch" style="background:#F59E0B">#F59E0B</div>
<div class="swatch" style="background:#F43F5E">#F43F5E</div>
<div class="swatch" style="background:#38BDF8">#38BDF8</div>
</div>
</div>

<div class="section">
<h2>Charts</h2>
<div class="grid">
<div class="swatch light-text" style="background:#3A63F3">#3A63F3</div>
<div class="swatch" style="background:#F43F5E">#F43F5E</div>
<div class="swatch" style="background:#22C55E">#22C55E</div>
<div class="swatch light-text" style="background:#A78BFA">#A78BFA</div>
<div class="swatch" style="background:#F59E0B">#F59E0B</div>
<div class="swatch light-text" style="background:#06B6D4">#06B6D4</div>
<div class="swatch" style="background:#84CC16">#84CC16</div>
</div>
</div>

</body>
</html>
